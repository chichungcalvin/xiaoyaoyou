<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>指定篇章字詞/句式溫習卡</title>
    <style>
        :root { 
            --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f2f4f7; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background: var(--bg); 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px 15px;
        }

        /* 首頁目錄樣式 */
        #menu-page { width: 100%; max-width: 600px; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .menu-btn { 
            background: white; border: 2px solid #ddd; padding: 20px 10px; border-radius: 15px;
            font-size: 1rem; font-weight: bold; color: var(--primary); cursor: pointer;
            transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .menu-btn:active { transform: scale(0.95); background: var(--secondary); color: white; }
        .menu-btn.disabled { opacity: 0.5; background: #eee; cursor: not-allowed; }

        /* 溫習介面樣式 (預設隱藏) */
        #game-ui, #summary { display: none; width: 100%; max-width: 500px; flex-direction: column; align-items: center; }
        
        /* 保持之前的卡片與按鈕樣式... */
        .header-info { width: 100%; display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; }
        .progress-container { width: 100%; height: 12px; background: #e0e0e0; border-radius: 6px; margin-bottom: 20px; overflow: hidden; }
        #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #2ecc71, #27ae60); transition: width 0.4s; }
        .card-container { perspective: 1000px; width: 100%; height: 320px; position: relative; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border-radius: 20px; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #ddd; }
        .card-front { background: white; }
        .card-back { background: var(--secondary); color: white; transform: rotateY(180deg); }
        .tag { position: absolute; top: 15px; left: 20px; font-size: 0.8rem; padding: 4px 12px; border-radius: 15px; background: #f8f9fa; color: #7f8c8d; }
        .controls { margin-top: 30px; display: flex; gap: 15px; width: 100%; }
        button { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; touch-action: manipulation; }
        .btn-correct { background: var(--success); color: white; }
        .btn-wrong { background: var(--error); color: white; }
        .btn-back { background: #95a5a6; color: white; margin-top: 20px; width: 100%; }
        .wrong-list { margin-top: 20px; text-align: left; max-height: 300px; overflow-y: auto; background: #fff; padding: 10px; border-radius: 10px; width: 100%; }
        .highlight { color: var(--error); font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="menu-page">
        <h1>〈指定篇章字詞/句式〉<br>溫習卡目錄</h1>
        <div class="menu-grid">
            <button class="menu-btn disabled">詩三首</button>
            <button class="menu-btn disabled">詞三首</button>
            <button class="menu-btn disabled">岳陽樓記</button>
            <button class="menu-btn disabled">勸學(節錄)</button>
            <button class="menu-btn disabled">師說</button>
            <button class="menu-btn disabled">廉頗藺相如列傳</button>
            <button class="menu-btn disabled">論仁論孝論君子</button>
            <button class="menu-btn disabled">魚我所欲也</button>
            <button class="menu-btn disabled">出師表</button>
            <button class="menu-btn disabled">六國論</button>
            <button class="menu-btn" onclick="startStudy('xiaoyaoyou')">逍遙遊(節錄)</button>
            <button class="menu-btn" onclick="startStudy('xishanyouji')">始得西山宴遊記</button>
        </div>
    </div>

    <div id="game-ui">
        <h2 id="current-title" style="margin-bottom: 10px; color: var(--primary);"></h2>
        <div class="header-info">
            <span id="timer">⏳ 00:00</span>
            <span id="counter">1 / --</span>
        </div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div class="card-container" onclick="flipCard()">
            <div class="card" id="card">
                <div class="card-face card-front">
                    <span class="tag" id="tag">注釋</span>
                    <div id="frontText" style="font-size: 1.4rem; line-height: 1.6;"></div>
                </div>
                <div class="card-face card-back">
                    <div id="backText" style="font-size: 1.2rem; line-height: 1.6;"></div>
                </div>
            </div>
        </div>
        <div class="controls">
            <button class="btn-wrong" onclick="markAnswer(false)">❌ 答錯了</button>
            <button class="btn-correct" onclick="markAnswer(true)">✅ 我會了</button>
        </div>
    </div>

    <div id="summary">
        <h2 style="text-align: center;">🎉 溫習完成！</h2>
        <p id="stats-time" style="text-align: center;"></p>
        <div style="display: flex; justify-content: space-around; width: 100%; margin: 20px 0;">
            <div style="text-align: center;"><div style="color: var(--success); font-size: 2rem; font-weight: bold;" id="correct-count">0</div><div>答對</div></div>
            <div style="text-align: center;"><div style="color: var(--error); font-size: 2rem; font-weight: bold;" id="wrong-count">0</div><div>答錯</div></div>
        </div>
        <div id="wrong-review-section" style="width: 100%;">
            <h3 style="color: var(--error);">需重點複習：</h3>
            <div class="wrong-list" id="wrong-list"></div>
        </div>
        <button class="btn-back" onclick="location.reload()">返回目錄</button>
    </div>

    <script>
        const allData = {
            xiaoyaoyou: {
                title: "逍遙遊(節錄)",
                data: [
                    { f: "魏王<span class='highlight'>貽</span>我大瓠之種", b: "貽：贈送 / 贈。", t: "注釋 2" },
                    { f: "我樹之成而<span class='highlight'>實</span>五石", b: "實：果實 / 結出的果實。", t: "注釋 3" },
                    { f: "我樹之成而實五<span class='highlight'>石</span>", b: "石：容量單位，十斗為一石。", t: "注釋 3" },
                    { f: "不<span class='highlight'>龜手</span>之藥", b: "龜手：皮膚受凍裂開。龜：通「皸」。", t: "注釋 10" },
                    { f: "立之<span class='highlight'>塗</span>", b: "塗：通「途」，道路。", t: "注釋 23" }
                    // ... 之前的 44 條可以全部放在這裡
                ]
            },
            xishanyouji: {
                title: "始得西山宴遊記",
                data: [
                    { f: "自為<span class='highlight'>僇人</span>", b: "僇人：受過刑辱而被貶的人。", t: "注釋 1" },
                    { f: "<span class='highlight'>恆</span>惴慄", b: "恆：經常 / 常常。", t: "注釋 2" },
                    { f: "恆<span class='highlight'>惴慄</span>", b: "惴慄：憂懼、恐懼。", t: "注釋 2" },
                    { f: "<span class='highlight'>幽泉</span>怪石", b: "幽泉：深僻的泉水。", t: "注釋 5" },
                    { f: "到則<span class='highlight'>披</span>草而坐", b: "披：撥開。", t: "注釋 7" },
                    { f: "過湘江，<span class='highlight'>緣</span>染溪", b: "緣：沿著。", t: "注釋 12" },
                    { f: "<span class='highlight'>窮</span>山之高而止", b: "窮：走到盡頭。", t: "注釋 14" },
                    { f: "攀援而登，<span class='highlight'>箕踞</span>而遨", b: "箕踞：隨意伸開兩腿坐著，形如簸箕。", t: "注釋 15" }
                ]
            }
            // 剩下的篇章可以陸續加入...
        };

        let currentSet = [];
        let currentIndex = 0;
        let correctAnswers = 0;
        let wrongItems = [];
        let startTime, timerInterval;

        function startStudy(chapterId) {
            const chapter = allData[chapterId];
            if (!chapter) return;
            
            currentSet = chapter.data.slice().sort(() => Math.random() - 0.5);
            document.getElementById('current-title').innerText = chapter.title;
            document.getElementById('menu-page').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            
            currentIndex = 0;
            correctAnswers = 0;
            wrongItems = [];
            startTime = new Date();
            timerInterval = setInterval(updateTimer, 1000);
            showCard();
        }

        function showCard() {
            document.getElementById('card').classList.remove('is-flipped');
            const item = currentSet[currentIndex];
            document.getElementById('frontText').innerHTML = item.f;
            document.getElementById('backText').innerHTML = item.b;
            document.getElementById('tag').innerText = item.t;
            document.getElementById('counter').innerText = `${currentIndex + 1} / ${currentSet.length}`;
            document.getElementById('progress-bar').style.width = `${(currentIndex / currentSet.length) * 100}%`;
        }

        function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }

        function markAnswer(isCorrect) {
            if (isCorrect) correctAnswers++;
            else wrongItems.push(currentSet[currentIndex]);

            if (currentIndex < currentSet.length - 1) {
                currentIndex++;
                showCard();
            } else {
                showSummary();
            }
        }

        function updateTimer() {
            const diff = Math.floor((new Date() - startTime) / 1000);
            const m = Math.floor(diff / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `⏳ ${m}:${s}`;
        }

        function showSummary() {
            clearInterval(timerInterval);
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('summary').style.display = 'flex';
            document.getElementById('correct-count').innerText = correctAnswers;
            document.getElementById('wrong-count').innerText = wrongItems.length;
            
            const listEl = document.getElementById('wrong-list');
            listEl.innerHTML = wrongItems.length === 0 ? "完美！" : 
                wrongItems.map(i => `<div style="margin-bottom:10px;"><b>${i.f}</b><br>${i.b}</div>`).join('');
        }
    </script>
</body>
</html>
